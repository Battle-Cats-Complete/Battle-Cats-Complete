name: Sync to Public Repo

on:
  # 0. Removed automatic Push logic 
  #push:
    #branches:
      #- main 
  workflow_dispatch:

jobs:
  sync_and_sanitize:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out Private (Source) Repo
      - name: Checkout Private Source
        uses: actions/checkout@v4
        with:
          path: source_repo
          fetch-depth: 0

      # 2. Check out Public (Portfolio) Repo
      - name: Checkout Public Portfolio
        uses: actions/checkout@v4
        with:
          repository: WonderMOMOCO/Battle-Cats-Complete
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public_repo

      # 3. Mirror Files & Sanitize
      - name: Sync and Overwrite
        run: |
          # A. Mirror source to public
          # We exclude .git and the private .github folder entirely
          rsync -av --delete --exclude '.git' --exclude '.github' source_repo/ public_repo/

          # B. Apply Sanitization
          # Instead of wildcards, we copy the specific directories we need
          if [ -d "source_repo/sanitized/.github" ]; then
            mkdir -p public_repo/.github
            cp -rv source_repo/sanitized/.github/* public_repo/.github/
          fi
          
          # C. Copy sanitized source files (like dummy crypto.rs)
          cp -rv source_repo/sanitized/src/* public_repo/src/
          
          # D. Reset Cargo Features
          # We target the file directly in the public_repo
          sed -i 's/default = \["dev"\]/default = \[\]/' public_repo/Cargo.toml

      # 4. Commit to Public
      - name: Commit and Push
        run: |
          cd public_repo
          # Configure Git
          git config user.name "Your Name"
          git config user.email "your@email.com"
          
          # Add and commit
          git add .
          if [[ -n $(git status -s) ]]; then
            git commit -m "Update: $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes to sync."
          fi