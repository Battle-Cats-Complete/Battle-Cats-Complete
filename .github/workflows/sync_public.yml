name: Sync to Public Repo

on:
  # 0. Removed automatic Push logic
  #push:
    #branches:
      #- main 
  workflow_dispatch:

jobs:
  sync_and_sanitize:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out Private (Source) Repo
      - name: Checkout Private Source
        uses: actions/checkout@v4
        with:
          path: source_repo
          fetch-depth: 0

      # 2. Check out Public (Portfolio) Repo
      - name: Checkout Public Portfolio
        uses: actions/checkout@v4
        with:
          repository: WonderMOMOCO/Battle-Cats-Complete
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public_repo

      # 3. Mirror Files & Sanitize
      - name: Sync and Overwrite
        run: |
          # 1. Sync but EXCLUDE private files AND the standard Readme
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'crates/' \
            --exclude 'src/import_data/mod_dev.rs' \
            --exclude 'src/import_data/game_data_dev.rs' \
            --exclude 'README.md' \
            source_repo/ public_repo/

          # 2. THE README SWAP
          # We take the special public readme and make it the MAIN readme
          mv public_repo/README_pub.md public_repo/README.md

          # 3. Sanitize Cargo.toml
          sed -i '/crates\/bc_crypto/d' public_repo/Cargo.toml
          sed -i '/bc_crypto/d' public_repo/Cargo.toml
          sed -i 's/default *=.*\["dev"\]/default = []/' public_repo/Cargo.toml
          
          # 4. Refresh Lockfile
          cd public_repo
          rm -f Cargo.lock
          cargo generate-lockfile
          
          # 5. Cleanup (if any sanitized folder remains)
          if [ -d "sanitized" ]; then
            rm -rf sanitized
          fi

      # 4. Commit to Public
      - name: Commit and Push
        run: |
          cd public_repo
          # Configure Git
          git config user.name "Your Name"
          git config user.email "your@email.com"
          
          # Add and commit
          git add .
          if [[ -n $(git status -s) ]]; then
            git commit -m "Update: $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes to sync."
          fi