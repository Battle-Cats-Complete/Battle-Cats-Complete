name: Sync to Public Repo

on:
  push:
    branches:
      - main 
  workflow_dispatch:

jobs:
  sync_and_sanitize:
    runs-on: ubuntu-latest
    steps:
      # Check battle-cats-custom-source
      - name: Checkout Private Source
        uses: actions/checkout@v4
        with:
          path: source_repo

      # Check Battle-Cats_Custom
      - name: Checkout Public Portfolio
        uses: actions/checkout@v4
        with:
          repository: WonderMOMOCO/Battle-Cats-Complete
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public_repo

      # Mirror Private files and sanitize them
      - name: Sync and Overwrite
        run: |
          # A. Mirror source to public (excluding git folder and workflow file)
          # This makes public_repo look exactly like source_repo initially
          rsync -av --delete --exclude '.git' --exclude '.github' source_repo/ public_repo/

          # B. Apply Sanitization
          # We enter the public repo directory to run file operations
          cd public_repo

          # Copy contents of 'sanitized/' over the root '.'
          # This overwrites 'src/import_data/mod.rs' etc with the safe versions
          # -r = recursive, -f = force
          cp -rf sanitized/* .

          # C. Cleanup
          # Remove the 'sanitized' folder so it doesn't appear in the public repo
          rm -rf sanitized

      # Push changes to Public
      - name: Commit and Push
        working-directory: public_repo
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          # Check if there are any changes to commit
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "Sync from private source (Sanitized)"
            git push origin main
          else
            echo "No changes to sync."
          fi