name: Sync to Public Repo

on:
  workflow_dispatch:

jobs:
  sync_and_sanitize:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out Private (Source) Repo
      - name: Checkout Private Source
        uses: actions/checkout@v4
        with:
          path: source_repo
          fetch-depth: 0

      # 2. Check out Public (Portfolio) Repo
      - name: Checkout Public Portfolio
        uses: actions/checkout@v4
        with:
          repository: WonderMOMOCO/Battle-Cats-Complete
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public_repo

      # 3. Mirror Files (With src/dev exclusion)
      - name: Sync and Overwrite
        run: |
          # Sync Files using rsync
          # --delete: Removes files in public_repo that no longer exist in source_repo (cleans up old architecture)
          # --exclude 'src/dev': Keeps your dev tools private
          # --exclude '.git': Protects the public repo's history
          
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'src/dev' \
            source_repo/ public_repo/

      # 4. Commit to Public
      - name: Commit and Push
        run: |
          cd public_repo
          
          # Configure Git
          # Change these to your preferred public identity if needed
          git config user.name "WonderMOMOCO"
          git config user.email "WonderMOMOCO@users.noreply.github.com"
          
          # Add all changes (including deletions from the rsync)
          git add .
          
          # Commit only if there are changes
          if [[ -n $(git status -s) ]]; then
            git commit -m "Refactor Update: v0.3.0"
            git push origin main
          else
            echo "No changes to sync."
          fi
