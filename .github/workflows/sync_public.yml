name: Sync to Public Repo

on:
  # 0. Removed automatic Push logic 
  #push:
    #branches:
      #- main 
  workflow_dispatch:

jobs:
  sync_and_sanitize:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out Private (Source) Repo
      - name: Checkout Private Source
        uses: actions/checkout@v4
        with:
          path: source_repo
          fetch-depth: 0

      # 2. Check out Public (Portfolio) Repo
      - name: Checkout Public Portfolio
        uses: actions/checkout@v4
        with:
          repository: WonderMOMOCO/Battle-Cats-Complete
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public_repo

      # 3. Mirror Files & Sanitize
      - name: Sync and Overwrite
        run: |
          # A. Mirror source to public (excluding private git/workflows)
          rsync -av --delete --exclude '.git' --exclude '.github' source_repo/ public_repo/

          # B. Move sanitized files to their real locations
          # This moves everything inside sanitized/ to the root of public_repo/
          cp -rv public_repo/sanitized/. public_repo/
          
          # C. Reset Cargo Features (Fuzzy match to catch spacing)
          sed -i 's/default *=.*\["dev"\]/default = []/' public_repo/Cargo.toml

          # D. CRITICAL: Remove the sanitized folder so it's not pushed
          rm -rf public_repo/sanitized

      # 4. Commit to Public
      - name: Commit and Push
        run: |
          cd public_repo
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          git add .
          # Check if there are actually changes to avoid empty commit errors
          if [[ -n $(git status -s) ]]; then
            git commit -m "Update: $(date +'%Y-%m-%d')"
            git push origin main
          fi