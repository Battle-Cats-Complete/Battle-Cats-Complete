name: Sync to Public Repo

on:
  # 0. Removed automatic Push logic
  #push:
    #branches:
      #- main 
  workflow_dispatch:

jobs:
  sync_and_sanitize:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out Private (Source) Repo
      - name: Checkout Private Source
        uses: actions/checkout@v4
        with:
          path: source_repo
          fetch-depth: 0

      # 2. Check out Public (Portfolio) Repo
      - name: Checkout Public Portfolio
        uses: actions/checkout@v4
        with:
          repository: WonderMOMOCO/Battle-Cats-Complete
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public_repo

      # 3. Mirror Files & Sanitize
      - name: Sync and Overwrite
        run: |
          rsync -av --delete --exclude '.git' --exclude '.github' source_repo/ public_repo/

          # Set public repo to no features
          sed -i 's/default *=.*\["dev"\]/default = []/' public_repo/Cargo.toml
          
          # Force a fresh lockfile based on the gated dependencies
          cd public_repo
          rm -f Cargo.lock
          cargo generate-lockfile
          
          # Apply dummy files and cleanup
          if [ -d "sanitized" ]; then
            cp -rf sanitized/. .
            rm -rf sanitized
          fi

      # 4. Commit to Public
      - name: Commit and Push
        run: |
          cd public_repo
          # Configure Git
          git config user.name "Your Name"
          git config user.email "your@email.com"
          
          # Add and commit
          git add .
          if [[ -n $(git status -s) ]]; then
            git commit -m "Update: $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes to sync."
          fi