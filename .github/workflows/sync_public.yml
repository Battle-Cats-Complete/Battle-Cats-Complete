name: Sync to Public Repo

on:
  push:
    branches:
      - main 
  workflow_dispatch:

jobs:
  sync_and_sanitize:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out Private (Source) Repo
      - name: Checkout Private Source
        uses: actions/checkout@v4
        with:
          path: source_repo
          fetch-depth: 0

      # 2. Check out Public (Portfolio) Repo
      - name: Checkout Public Portfolio
        uses: actions/checkout@v4
        with:
          repository: WonderMOMOCO/Battle-Cats-Complete
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public_repo

      # 3. Mirror Files & Sanitize
      - name: Sync and Overwrite
        run: |
          # A. Mirror source to public (excluding git folder and workflow file)
          rsync -av --delete --exclude '.git' --exclude '.github' source_repo/ public_repo/

          # B. Apply Sanitization
          cd public_repo
          cp -rf sanitized/* .
          rm -rf sanitized

      # 4. Commit to Public
      - name: Commit and Force Push
        run: |
          # 1. Get the last commit details from the PRIVATE repo
          cd source_repo
          LAST_MSG=$(git log -1 --pretty=%B)
          AUTHOR_NAME=$(git log -1 --pretty=%an)
          AUTHOR_EMAIL=$(git log -1 --pretty=%ae)
          echo "Syncing commit from: $AUTHOR_NAME <$AUTHOR_EMAIL>"
          cd ..
          
          # 2. Configure Git for the PUBLIC repo
          cd public_repo
          git config user.name "$AUTHOR_NAME"
          git config user.email "$AUTHOR_EMAIL"
          
          # 3. Create a fresh 'orphan' branch with no history
          # This creates a new branch named 'temp_clean' unrelated to previous commits
          git checkout --orphan temp_clean
          
          # 4. Add all files and commit
          git add .
          git commit -m "$LAST_MSG"
          
          # 5. Delete the old 'main' branch locally and rename ours to 'main'
          git branch -D main || true
          git branch -m main
          
          # 6. Force push to overwrite the public repo completely
          git push -f origin main